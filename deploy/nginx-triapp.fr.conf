# /etc/nginx/sites-available/triapp.fr
# Activer : ln -s /etc/nginx/sites-available/triapp.fr /etc/nginx/sites-enabled/
# SSL : certbot --nginx -d triapp.fr -d www.triapp.fr

server {
    listen 80;
    server_name triapp.fr www.triapp.fr;
    return 301 https://triapp.fr$request_uri;
}

server {
    listen 443 ssl;
    server_name www.triapp.fr;
    ssl_certificate     /etc/letsencrypt/live/triapp.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/triapp.fr/privkey.pem;
    return 301 https://triapp.fr$request_uri;
}

server {
    listen 443 ssl;
    server_name triapp.fr;

    ssl_certificate     /etc/letsencrypt/live/triapp.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/triapp.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Stripe webhook — pas de buffering pour la vérification de signature
    location /api/stripe/webhook {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
